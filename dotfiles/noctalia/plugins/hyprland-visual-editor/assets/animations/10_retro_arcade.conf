# @Title: Retro Arcade
# @Icon: device-gamepad-2
# @Color: #f472b6
# @Tag: 80s
# @Desc: "Toon/Arcade" effect. The windows jump and bounce exaggeratedly.

# ------------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# ------------------------------------------------------
# Optimized by NVL: We have moved the "crazy" curve
# from the movement (where it was annoying) to the entrance (where it was fun).
# ------------------------------------------------------

animations {
    enabled = true

    # ---BEZIERS ARCADE ---

    # "JUMP" (Your old smoothIn): The jewel in the crown.
    # Backs up a lot and bounces a lot. Perfect for "pop" windows.
    bezier = jump, 0.5, -0.3, 0.68, 1.4

    # "SQUASH" (To close):
    # Anticipation to gain momentum and disappear.
    bezier = squash, 0.5, -0.5, 0.1, 1.0

    # "RUBBER" (To move):
    # A more controlled bounce so that dragging is not an ordeal.
    bezier = rubber, 0.05, 0.9, 0.1, 1.05

    # ---WINDOWS (The Show) ---

    # INPUT: 'popin 80%' + 'jump'.
    # The window appears small, shrinks for a millisecond, and BOING! explodes on screen.
    # Speed ​​5 so that the caricature can be appreciated.
    animation = windowsIn, 1, 5, jump, popin 80%

    # OUTPUT: 'popin 80%' + 'squash'.
    # The window shrinks drastically (as if being vacuumed) before leaving.
    animation = windowsOut, 1, 4, squash, popin 80%

    # MOVEMENT: We use 'rubber' (standard overshot).
    # We want it to be fun but controllable.
    animation = windowsMove, 1, 4, rubber, slide

    # ---REST OF THE SYSTEM ---

    # Fades: Quick and simple so as not to distract from the main show.
    animation = fade, 1, 3, default

    # Workspaces: BOING!
    # Switching desktops causes the entire screen to bounce.
    # It's a very strong effect, but it fits perfectly with the "Retro" theme.
    animation = workspaces, 1, 5, jump, slide
}