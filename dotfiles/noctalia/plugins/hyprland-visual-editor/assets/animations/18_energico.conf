# @Title: Energetic
# @Icon: flame
# @Color: #e11d48
# @Tag: BOLD
# @Desc: Maximum visual impact. Exaggerated rebounds (56%) and backward exits.

# ------------------------------------------------------
# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# ------------------------------------------------------
# Optimized by NVL: Remapped high impact curve
# to the input to avoid visual glitches when closing.
# ------------------------------------------------------

animations {
    enabled = true

    # ---HIGH OCTANE BEZIERS ---

    # "Nitro" (Your original OutBack):
    # Go up to 1.56. It is the most aggressive bounce of the entire collection.
    # Perfect for triumphal entrances.
    bezier = nitro, 0.34, 1.56, 0.64, 1

    # "Recoil":
    # Go down to -0.3. The window visibly shrinks before disappearing.
    # It's like the recoil of a gun.
    bezier = recoil, 0.36, 0, 0.66, -0.56

    # "Crazy" (For movement):
    # A strong but controlled bounce to make dragging windows feel powerful.
    bezier = crazy, 0.05, 0.9, 0.1, 1.05

    # ---WINDOWS (Explosions) ---

    # INPUT: 'popin 80%' + 'nitro'.
    # The window appears, it grows larger than necessary (it takes up almost the entire screen for a moment)
    # and settles into place. BOOM!
    animation = windowsIn, 1, 6, nitro, popin 80%

    # OUTPUT: 'popin 80%' + 'recoil'.
    # The window shrinks abruptly and disappears.
    animation = windowsOut, 1, 5, recoil, popin 80%

    # MOVEMENT: Heavy and powerful.
    animation = windowsMove, 1, 5, crazy, slide

    # ---FADES ---
    # Quick, we don't want to distract from the main action.
    animation = fade, 1, 3, default
    animation = layers, 1, 4, nitro, popin

    # ---WORK SPACES (Earthquake) ---
    # We use 'nitro' here too.
    # Switching desktops shakes the screen hard.
    animation = workspaces, 1, 5, nitro, slide
}