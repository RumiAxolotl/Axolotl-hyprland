# @Icon: sparkles
# @Color: #94a3b8
# @Tag: PRO
# @Desc: Zero distractions. Absolute smoothness without bounces or sudden movements.


# ------------------------------------------------------
# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# ------------------------------------------------------
# Optimized by NVL: Removed all bounce physics.
# Adjusted for maximum concentration and zero eye strain.
# ------------------------------------------------------

animations {
    enabled = true

    # ---OFFICE BEZIERS ---

    # "Soft": A soft Quartic curve.
    # Start with determination and stop with absolute elegance.
    bezier = soft, 0.25, 1, 0.5, 1

    # "Focus": Linear-Smoothed.
    # For movements that need to be fast but not dry.
    bezier = focus, 0.16, 1, 0.3, 1

    # ---WINDOWS (Focus Mode) ---

    # INPUT: 'popin 95%' + 'soft'.
    # The window appears almost in place. It does not travel across the screen.
    #Speed ‚Äč‚Äč5: Fast enough not to wait, slow enough not to scare.
    animation = windowsIn, 1, 5, soft, popin 95%

    # OUTPUT: 'popin 98%' + 'focus'.
    # Almost a pure fade, with a micro-scaling.
    #Speed ‚Äč‚Äč4: Quick disappearance.
    animation = windowsOut, 1, 4, focus, popin 98%

    # MOVEMENT: Solid.
    # The window feels heavy and stable, it doesn't float.
    animation = windowsMove, 1, 5, soft, slide

    # ---LAYERS AND FADES ---
    # Speed 4: Quick transitions.
    animation = fade, 1, 4, soft

    # Layers: They enter by sliding very little.
    animation = layers, 1, 4, soft, popin

    # ---WORK SPACES (Flow) ---
    # 'slidefade 5%'.
    # Look at the 5%. It's a tiny movement.
    # The desktop changes almost without moving, it just slides a few pixels.
    # It is the definition of "Subtle".
    animation = workspaces, 1, 5, soft, slidefade 5%
}