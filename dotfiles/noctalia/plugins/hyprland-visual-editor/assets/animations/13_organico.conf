# ------------------------------------------------------
# @Title: Organic
# @Icon: leaf
# @Color: #a3e635
# @Tag: NATURE
# @Desc: "Sprout" movement. Smooth vertical growth and slow fades.
# ------------------------------------------------------

# ------------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# >>> Optimized by NVL: Cleanup of redundancies and plant physics. <<<

animations {
    enabled = yes

    # ---NATURAL BEZIERS ---

    # "Sprout":
    # Starts slow, rises and settles extremely smoothly.
    # It does not have an aggressive bounce, it is like a leaf swayed by the wind.
    bezier = sprout, 0.25, 0.8, 0.25, 1.0

    # "Wind":
    # A slight overshot (1.05) for when we move windows,
    # so that they don't look like stones, but rather something light.
    bezier = wind, 0.05, 0.9, 0.1, 1.05

    # ---WINDOWS (Photosynthesis) ---
    # INPUT: 'popin 85%'.
    # The window "pops up" to almost full size.
    #Speed ​​6: Slow and relaxing.
    animation = windowsIn, 1, 6, sprout, popin 85%

    # OUTPUT: 'popin 95%'.
    # Hardly shrinks. It simply evaporates like dew.
    animation = windowsOut, 1, 5, sprout, popin 95%

    # MOVEMENT: We use 'wind' to make it feel light when dragging.
    animation = windowsMove, 1, 5, wind, slide

    # ---FADES (Fog) ---
    # Speed ​​7: Very slow and dreamlike transparencies.
    animation = fade, 1, 7, sprout

    # Layers: They enter gently growing.
    animation = layers, 1, 5, sprout, popin

    # ---WORK SPACES (Creeper) ---
    # We maintain your 'slidevert'.
    # Moving between desks feels like climbing a vine.
    animation = workspaces, 1, 6, sprout, slidevert
}