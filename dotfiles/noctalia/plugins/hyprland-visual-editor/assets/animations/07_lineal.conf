# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# ------------------------------------------------------
# Optimized by NVL: Increased speed to avoid lag sensation.
# ------------------------------------------------------

animations {
    enabled = true
    # ---STANDARD LINEAR BEZIER ---
    # Correct mathematical definition of a line from 0 to 1.
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # ---WINDOWS (Machine Style) ---
    # Speed 5: Fast enough so that the final "hit" doesn't bother you.
    # We use pure 'slide'. Without scales or strange transparencies.
    animation = windowsIn, 1, 5, linear, slide
    animation = windowsOut, 1, 5, linear, slide

    # Movement: Here the linearity feels very "raw".
    # The window follows the mouse exactly, without weight.
    animation = windowsMove, 1, 5, linear, slide

    # ---FADES AND LAYERS ---
    # Linear fades should be fast.
    animation = fade, 1, 4, linear
    animation = layers, 1, 4, linear, fade

    # ---WORK SPACES ---
    # Simple Slide. It's like flipping slides on an old projector.
    # Dry, fast and functional.
    animation = workspaces, 1, 5, linear, slide
}