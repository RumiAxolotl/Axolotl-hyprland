# @Title: Faded
# @Icon: cloud
# @Color: #cbd5e1
# @Tag: GHOST
# @Desc: Spectral materialization. The windows appear smoothly without barely moving.

# ------------------------------------------------------
# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# ------------------------------------------------------
# Optimized by NVL: Removed physical bounces.
# Full focus on opacity and subtle scaling (The Ghost Effect).
# ------------------------------------------------------

animations {
    enabled = yes

    # ---SPECTRAL BEZIERS ---

    # "Phantom": A pure Sine curve.
    # There are no sudden accelerations or braking. It's like breathing.
    bezier = phantom, 0.4, 0, 0.6, 1

    # "Mist":
    # For movement. A little more friction so it doesn't slip.
    bezier = mist, 0.2, 0.8, 0.2, 1

    # ---WINDOWS (Appearances) ---

    # INPUT: 'popin 90%' + 'phantom'.
    # The window appears almost at its final size, it only grows by 10% while it becomes opaque.
    #Speed ‚Äč‚Äč7: Slow. We want to see the transition.
    animation = windowsIn, 1, 7, phantom, popin 90%

    # OUTPUT: 'popin 95%' + 'phantom'.
    # It barely moves when closed. It just stops being there.
    animation = windowsOut, 1, 6, phantom, popin 95%

    # MOVEMENT: Smooth and silent.
    animation = windowsMove, 1, 6, mist, slide

    # ---FADES (The Core) ---
    # Speed ‚Äč‚Äč8: The transparencies are very noticeable.
    animation = fade, 1, 8, phantom

    # Layers: Menus appear floating.
    animation = layers, 1, 6, phantom, popin

    # ---WORK SPACES (Teleportation) ---
    # Forget the 'slidevert'. A ghost walks through walls.
    # We use pure 'fade' or 'slidefade' with very little movement.
    # This causes the old desktop to dissolve into the new one.
    animation = workspaces, 1, 8, phantom, fade
}