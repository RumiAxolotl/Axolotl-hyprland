# @Title: Silk
# @Icon: feather
# @Color: #4ade80
# @Tag: HYBRID
# @Desc: The refined JaKooLit style. Energetic entries, fleeting exits and stable workspaces.

# ------------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# ------------------------------------------------------
# Optimized by NVL: The bounce in the
# workspaces to avoid motion sickness.
# ------------------------------------------------------

animations {
    enabled = yes

    # ---BEZIERS (The JaKooLit Signature) ---

    # "Overshot": The perfect standard bounce.
    # Goes up fast, goes 5% and comes back. It feels organic.
    bezier = overshot, 0.05, 0.9, 0.1, 1.05

    # "SmoothOut": A smooth curve for fast exits.
    # Starts smooth, accelerates and ends smooth. No pulling.
    bezier = smoothOut, 0.3, 0, 0.3, 1
    # "Crazy": (Optional) If you want to keep that aggressive entrance from the original.
    # We will use it only for window input, NOT for workspaces.
    bezier = crazy, 0.1, 1.1, 0.1, 1.1

    # ---WINDOWS (Controlled Energy) ---

    # INPUT: We use 'overshot' (or 'crazy' if you want more bounce).
    # 'popin 80%' + 'slide' creates that effect of the window launching towards you.
    # Speed ​​6: The fluidity is noticeable.
    animation = windowsIn, 1, 6, overshot, slide
    # OUTPUT: Fast (Speed ​​4).
    # The window leaves without disturbing using the smooth curve.
    animation = windowsOut, 1, 4, smoothOut, slide

    # MOVEMENT: Fluid and connected to the mouse.
    animation = windowsMove, 1, 5, overshot, slide

    # ---LAYERS AND FADES ---
    animation = fade, 1, 5, smoothOut
    animation = layers, 1, 5, overshot, slide

    # ---WORK SPACES (Here is the improvement) ---
    # Instead of using crazy curves, we use standard 'overshot'.
    # The desktop shift has a little "settlement" at the end,
    # but it no longer looks like the screen is made of jelly.
    animation = workspaces, 1, 6, overshot, slide
}