# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą
# ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą
#

# ------------------------------------------------------
# Optimized by NVL: Converted from "Fast Lift"
# to "Royal Physical Dock".
# ------------------------------------------------------

animations {
    enabled = true

    # ---PHYSICS BEZIERS ---

    # "Spring" (The Pier):
    # It goes up quickly, goes up to 1.1 (10% extra) and returns to its place.
    bezier = spring, 0.05, 0.9, 0.1, 1.1

    # "Crouch":
    # Before jumping (closing), it shrinks down a little (-0.1).
    bezier = crouch, 0.1, -0.1, 0.1, 1.0

    # ---WINDOWS (Gravity Effect) ---

    # INPUT: 'popin 80%' + 'spring'.
    # The window falls from above (or grows) and BOING, it bounces upon arrival.
    # Speed ‚Äč‚Äč5: We need time to see the rebound.
    animation = windowsIn, 1, 5, spring, popin 80%

    # OUTPUT: 'popin 80%' + 'crouch'.
    # The window makes a downward gesture and disappears.
    animation = windowsOut, 1, 5, crouch, popin 80%

    # MOVEMENT: Fluid but with a touch of elasticity.
    animation = windowsMove, 1, 5, spring, slide

    # ---FADES ---
    animation = fade, 1, 3, default
    animation = fadeLayersIn, 1, 3, default
    animation = layers, 1, 4, spring, popin

    # ---WORK SPACES (The Pogo Stick) ---
    # We maintain your original idea of verticality ('slidevert').
    # When changing desktops, the entire screen goes up/down and bounces when braking.
    # It's a very fun effect.
    animation = workspaces, 1, 5, spring, slidevert

    # Gestures (Annotated for security, best in hyprland.conf)
    # gesture = 3, horizontal, unset
    # gesture = 3, vertical, workspace
}