# @Title: Futuristic
# @Icon: cpu
# @Color: #22d3ee
# @Tag: TECH
# @Desc: Holographic interface. Digital precision, zero bounce and vertical data flow.

# ------------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# ------------------------------------------------------
# Optimized by NVL: Elasticity removed.
# Now uses exponential curves for "Robotic" precision.
# ------------------------------------------------------

animations {
    enabled = true

    # ---BEZIERS TECH ---

    # "Holo": Exponential Curve (Quint).
    # It darts and stops dead at exactly the right pixel.
    bezier = holo, 0.23, 1, 0.32, 1

    # "Data": Linear-Smoothed. For continuous information flows.
    bezier = data, 0.16, 1, 0.3, 1

    # ---WINDOWS (Projection) ---

    # INPUT: 'slide' from below.
    # The window appears to "pop up" from the console.
    # Speed ​​5: Fast but visible.
    animation = windowsIn, 1, 5, holo, slide

    # OUTPUT: 'popin 100%' + 'slide'.
    # The window does not resize, it just slides on and off.
    # Speed ​​4: Quick disconnect.
    animation = windowsOut, 1, 4, holo, popin 100%

    # MOVEMENT: Surgical precision.
    # The window follows the mouse without weight, like a laser cursor.
    animation = windowsMove, 1, 5, holo, slide

    # ---FADES (Digital) ---
    animation = fade, 1, 5, data
    animation = layers, 1, 5, holo, fade

    # ---WORK SPACES (The Matrix Style) ---
    # HERE IS THE KEY: 'slidevert' (Vertical Sliding).
    # Switching desktops feels like scrolling in a giant terminal.
    # Very "Cyberpunk".
    animation = workspaces, 1, 6, holo, slidevert

    # Special: Same thing, total vertical coherence.
    animation = specialWorkspace, 1, 6, holo, slidevert
}