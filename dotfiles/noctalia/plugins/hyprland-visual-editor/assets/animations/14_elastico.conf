# @Title: Elastic
# @Icon: arrows-diagonal
# @Color: #6366f1
# @Tag: FLEX
# @Desc: Rubber band physics. The windows reach, stretch and bounce vertically.


# ------------------------------------------------------
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#

# ------------------------------------------------------
# Optimized by NVL: Real bounce physics has been injected
# (15% Overshoot) to justify the name "Elastic".
# ------------------------------------------------------

animations {
    enabled = yes

    # ---ELASTIC BEZIERS ---

    # "Rubber" (La Rubber):
    # It rises very quickly and goes a long way (1.15) to create visual vibration.
    bezier = rubber, 0.05, 0.9, 0.1, 1.15

    # "Snap":
    # To close windows. A reverse curve that starts slow and accelerates a lot at the end.
    # How to release a tight rubber band.
    bezier = snap, 0.1, 1, 0, 1

    # ---WINDOWS (Bungee Jumping) ---
    # INPUT: 'slidevert' + 'rubber'.
    # The window enters from below/above and bounces when it reaches its position.
    # Speed ​​5: Perfect to see the effect.
    animation = windowsIn, 1, 5, rubber, slidevert

    # OUTPUT: 'slidevert' + 'snap'.
    # The window shoots towards the vertical edge.
    # Speed ​​4: Fast and dry.
    animation = windowsOut, 1, 4, snap, slidevert

    # MOVEMENT: Here we soften a little (minor overshot) so as not to get dizzy.
    animation = windowsMove, 1, 5, rubber, slide

    # ---FADES (Fast) ---
    # Elasticity implies kinetic energy, not slowness.
    animation = fade, 1, 4, default

    # Layers: Menus also bounce vertically.
    animation = layers, 1, 4, rubber, slidevert

    # ---WORK SPACES (Trampoline) ---
    # Vertical displacement with a lot of bounce.
    animation = workspaces, 1, 6, rubber, slidevert
}