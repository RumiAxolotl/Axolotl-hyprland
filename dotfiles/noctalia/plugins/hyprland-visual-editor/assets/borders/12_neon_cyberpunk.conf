# @Title: Neon Cyber-Glow (Dual)
# @Icon: bolt
# @Color: #00fff7
# @Tag: GLOW
# @Desc: Two-color glow simulation using a white/violet light base.

# ------------------------------------------------------
# Optimized by HVE
# ------------------------------------------------------

general {
    border_size = 2
    # The border is still two-color (Cyan and Magenta)
    col.active_border = rgba(00fff7ff) rgba(1a0026ff) rgba(ff00ffff) 45deg
    col.inactive_border = rgba(0f0f2655)
}
decoration {
    shadow {
        enabled = true
        range = 20 # We increase the range so that the aura is greater
        render_power = 4 # More power to make the glow dense

        # ---THE TRICK ---
        # We use a "bridge" color. A very transparent bluish white (44)
        # acts as a focus behind the border. Turning cyan and pink
        # on this white, it seems that both emit their own light.
        color = rgba(ffffff44)
offset = 0 0
    }
}

animations {
    enabled = yes
    bezier = nv_neon_flow, 0.4, 0, 0.2, 1
    animation = borderangle, 1, 30, nv_neon_flow, loop
}