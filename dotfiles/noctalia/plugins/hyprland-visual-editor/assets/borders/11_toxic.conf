# @Title: Toxic
# @Icon: biohazard
# @Color: #39ff14
# @Tag: ACID
# @Desc: Intense radioactive green with toxic flow effect.

# ------------------------------------------------------
# Optimized by NVL
# ------------------------------------------------------

general {
    # Thickness so that the effect is well appreciated
    border_size = 2

    # ---Radioactive Flow Effect ---
    # We use Neon Green (39ff14) + Deep Black (0c1017) + Neon Green (39ff14)
# This creates a "spot" of light that runs along the edge.
    col.active_border = rgba(39ff14ff) rgba(0c1017ff) rgba(39ff14ff) 30deg

    # Idle border in a very subtle dark green
    col.inactive_border = rgba(022c0b55)
}

animations {
    enabled = yes

    # Smooth curve for liquid movement
    bezier = nv_toxic, 0.4, 0, 0.2, 1

    # Speed 40: A middle ground between frenetic and elegant
    animation = borderangle, 1, 40, nv_toxic, loop
}