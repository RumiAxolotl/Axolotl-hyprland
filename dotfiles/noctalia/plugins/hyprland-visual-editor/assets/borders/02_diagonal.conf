# ------------------------------------------------------
# PRESET: 02_DIAGONAL_FADE (DYNAMIC VERSION)
# ------------------------------------------------------

general {
    # We merge the Primary color with the Surface color
    # This creates the fading effect towards the bottom of the window
    col.active_border = $primary $surface 45deg
    # Subtle idle so as not to distract
    col.inactive_border = $surface_lowest
}

# We keep the animation at 0 for a clean, static gradient
animation = borderangle, 0