# ------------------------------------------------------
# PRESET: 06_HEARTBEAT (EKG STYLE)
# ------------------------------------------------------
general {
    # We maintain the visual trick: A lot of empty space and little color.
    # This creates the spinning "energy ball."
col.active_border = $primary $surface $surface $surface 45deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # ---THE MAGIC CURVE ---
    # bezier = name, x1, y1, x2, y2
    #
    #0.05, 0.9 -> In 5% of the time, you have already completed 90% of the turn.
    #0.1, 1.0 -> In 10% of the time, the turn has finished (100%).
    # Rest of time -> Stays flat at 1.0 (still) until you restart the loop.
    bezier = heartbeat, 0.05, 0.9, 0.1, 1.0
    # Animation:
    # Speed 40: We set a long time (approx. 4 seconds total).
    # Thanks to the curve, the turn lasts 0.4s and the pause lasts 3.6s.
    # loop: Repeats infinitely.
    animation = borderangle, 1, 40, heartbeat, loop

    # The color comes in suddenly and stays
    animation = border, 1, 10, default
}