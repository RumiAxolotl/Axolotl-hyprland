# ------------------------------------------------------
# PRESET: 07_INFINITY_LOOP (DYNAMIC VERSION)
# ------------------------------------------------------

general {
    # We use the full palette: Primary -> Secondary -> Tertiary -> Error -> Primary
    # Repeating $primary at the end ensures that the gradient is circular and uncut.
col.active_border = $primary $secondary $tertiary $error $primary $secondary $tertiary $error 45deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # The 'linear' curve is mandatory so that the movement does not have jerks.
    # Note: We already injected it in assemble.sh, but defining it here ensures that it works.
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # Speed: 50 (Balanced). Not too fast that it distracts, nor too slow that it cannot be seen.
# The 'loop' mode keeps it active as long as the window has focus.
    animation = borderangle, 1, 50, linear, loop
}