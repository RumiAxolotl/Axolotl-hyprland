# @Title: the_joker
# @Icon: mood-sad
# @Color: #39ff14
# @Tag: THEME
# @Desc: Joker Aesthetic: Acid green and deep purple with electric glow.

# ------------------------------------------------------
# Optimized by HVE
# ------------------------------------------------------

general {
    border_size = 2

    # ---The Joker's Chaos ---
    # We combine Neon Green (39ff14) with an Electric Purple (9d00ff).
# The dark color in the middle (1a0026) is vital to make the lights appear separate.
    col.active_border = rgba(39ff14ff) rgba(1a0026ff) rgba(9d00ffff) 45deg

    # Inactive: Very dark and subtle purple
    col.inactive_border = rgba(1a002655)
}

decoration {
    # ---Gotham Glow ---
    shadow {
        enabled = true
        range = 18 # A slightly wider aura for the Joker effect
        render_power = 3

        # We use deep purple for the shadow.
        # By rotating the green on this purple background, a vibrant optical effect is created.
        color = rgba(9d00ff55)

        offset = 0 0
    }
}

animations {
    enabled = yes

    # Constant flow curve
    bezier = nv_joker_flow, 0.4, 0, 0.2, 1

    # Speed 30: A constant turn that maintains dynamism
    animation = borderangle, 1, 30, nv_joker_flow, loop
}