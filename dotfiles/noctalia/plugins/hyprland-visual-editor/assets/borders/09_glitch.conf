# ------------------------------------------------------
# PRESET: 09_CYBER_GLITCH (DYNAMIC VERSION)
# ------------------------------------------------------

general {
    # The Glitch trick: We put the background color ($surface) between the bright colors.
    # When rotating fast, the edge will appear to have "dead pixels" or flickering.
col.active_border = $error $surface $primary $surface 90deg
    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # 'Rapid' curve: Jumps almost instantly, eliminating any softness.
    bezier = rapid, 0, 1, 0, 1

    # Speed: 15 (Frantic).
    # On your RTX 5070ti this will look crisp and electric, with no blurry trails.
    animation = borderangle, 1, 15, rapid, loop
}