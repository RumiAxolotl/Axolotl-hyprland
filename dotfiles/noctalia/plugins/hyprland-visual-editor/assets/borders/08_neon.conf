# ------------------------------------------------------
# PRESET: 08_NEON_GLITCH (CYBERPUNK VERSION)
# ------------------------------------------------------

general {
    # HIGH CONTRAST:
    # We alternate the primary color with the background repeatedly.
    # This creates "streaks" of light instead of a smooth gradient.
# It looks like the filament of a light bulb or barcode.
    col.active_border = $primary $surface $primary $surface $primary $surface 45deg

    col.inactive_border = $surface_lowest
}

animations {
    enabled = yes

    # ---THE "GLITCH" CURVE ---
    # Note the negative (-0.5) and excessive (1.5) numbers.
    # This means:
    #1. Move quickly forward.
    #2. Back off! (The -0.5 causes the turn to reverse for an instant).
#3. Lunge forward again (1.5).
    bezier = glitch, 0.1, 1.5, 0.9, -0.5

    # Speed 40: A 4 second loop.
    # Being an infinite loop with that crazy curve, the edge will look like
    # is suffering from constant electrical interference.
    animation = borderangle, 1, 40, glitch, loop
}