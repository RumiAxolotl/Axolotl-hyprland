# PRESET: 05_FULL_SPECTRUM (DYNAMIC VERSION)
# ------------------------------------------------------

general {
    # The "Noctalia Gang": Purple, Orange, Aquamarine and Pink/Red.
    # This combination covers the entire visual spectrum of your brand.
col.active_border = $primary $secondary $tertiary $error 45deg

    # Ultra dark background to make the spectrum shine brighter
    col.inactive_border = $surface_lowest
}

# We maintain the static angle to appreciate the complete palette
animation = borderangle, 0