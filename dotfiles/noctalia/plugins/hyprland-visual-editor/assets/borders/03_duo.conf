# ------------------------------------------------------
# PRESET: 03_DUO_CONTRAST (DYNAMIC VERSION)
# ------------------------------------------------------

general {
    # We combine Purple ($primary) with Peach ($secondary)
    # 45 degree angle creates a perfect diagonal division
    col.active_border = $primary $secondary 90deg
    # Subtle idle
    col.inactive_border = $surface_lowest
}

# No rotation to keep color hierarchy fixed
animation = borderangle, 0