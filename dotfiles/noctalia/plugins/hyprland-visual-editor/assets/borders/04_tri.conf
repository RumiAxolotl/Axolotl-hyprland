# PRESET: 04_TRI_PRIME (DYNAMIC VERSION)
# ------------------------------------------------------

general {
    # The Noctalia triad: Purple ($primary), Orange ($secondary) and Aquamarine ($tertiary)
    # At 45 degrees, the three colors share the attention of the window.
col.active_border = $primary $secondary $tertiary 90deg

    # Dark idle to highlight the working window
    col.inactive_border = $surface_lowest
}

# No movement to maintain the elegance of the three fixed tones
animation = borderangle, 0