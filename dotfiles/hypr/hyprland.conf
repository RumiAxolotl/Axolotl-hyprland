source = ~/.config/hypr/exec.conf
source = ~/.config/hypr/keybind.conf
source = ~/.config/hypr/style.conf
source = ~/.config/hypr/nvidia.conf

env = QT_QPA_PLATFORMTHEME,qt5ct

# █▀▄▀█ █▀█ █▄░█ █ ▀█▀ █▀█ █▀█
# █░▀░█ █▄█ █░▀█ █ ░█░ █▄█ █▀▄
monitor=eDP-1,1920x1080@144,1920x0,1
monitor=HDMI-A-1,1920x1080@75,0x0,1

input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0
  float_switch_override_focus = 1
  touchpad {
    natural_scroll = true
  }
}

$TOUCHPAD_ENABLED = true
device {
  name = asup1205:00-093a:2008-touchpad
  enabled = $TOUCHPAD_ENABLED
}

# █▀▀ █▀▀ █▄░█ █▀▀ █▀█ ▄▀█ █░░
# █▄█ ██▄ █░▀█ ██▄ █▀▄ █▀█ █▄▄
general {
  # Added back some breathing room (space)
  gaps_in = 4
  gaps_out = 8
  
  # Slightly thicker border looks better with curved corners
  border_size = 2
  
  # Monochrome borders to match the minimal Waybar
  col.active_border = rgba($textAlphaff)
  col.inactive_border = rgba($surface0Alphaff)
  
  layout = dwindle
  resize_on_border = true
}

# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(kitty)$
}

# █▀▄ █▀▀ █▀▀ █▀█ █▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▄▀ ██▄ █▄▄ █▄█ █▀▄ █▀█ ░█░ █ █▄█ █░▀█
decoration {
  # Nice, elegant curves
  rounding = 8
  
  active_opacity = 1
  inactive_opacity = 1

  # Disabled blur for maximum performance and a cleaner look
  blur {
    enabled = false
  }
}

# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
animations {
  enabled = true
  
  # Fast, snappy, and linear bezier curve
  bezier = fastSnappy, 0.1, 1.0, 0.1, 1.0

  animation = windows, 1, 3, fastSnappy, slide
  animation = windowsOut, 1, 3, fastSnappy, slide
  animation = border, 0 # Disabled border color transitions
  animation = fade, 1, 2, fastSnappy
  animation = workspaces, 1, 3, fastSnappy
}

# █░░ ▄▀█ █▄█ █▀█ █░█ ▀█▀ █▀
# █▄▄ █▀█ ░█░ █▄█ █▄█ ░█░ ▄█
dwindle {
  preserve_split = true
  smart_resizing = true
}

# >>> HYPRLAND VISUAL EDITOR START <<<
# 1. Active Uninstall Watchdog
exec-once = /home/rumi/.cache/noctalia/HVE/hve_watchdog.sh
# 2. Variable Definition (Color Palette)
source = /home/rumi/.config/hypr/noctalia/noctalia-colors.conf
# 3. Effects Application (Visual Editor)
source = /home/rumi/.cache/noctalia/HVE/overlay.conf
